name: kasir_umkm
description: "Kasir UMKM - Professional Offline Point of Sale"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1


  # Navigation
  go_router: ^14.2.0

  # Database - SQLite + Drift ORM
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP & Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Secure Storage (for license/JWT)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0
  photo_view: ^0.14.0

  # Barcode & QR
  mobile_scanner: ^5.2.2
  barcode_widget: ^2.0.3
  qr_flutter: ^4.1.0

  # Bluetooth Printing
  print_bluetooth_thermal: ^1.0.12
  # Image processing
  image: ^4.1.3
  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Excel Export
  excel: ^4.0.3

  # File / Storage
  file_picker: ^8.0.7
  permission_handler: ^11.3.1
  share_plus: 12.0.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # DateTime
  intl: ^0.19.0

  # Device Info
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2

  # Crypto / UUID
  crypto: ^3.0.3
  uuid: ^4.4.2

  # JSON
  json_annotation: ^4.9.0

  # Local notifications
  flutter_local_notifications: ^17.2.3
  fpdart: ^1.2.0
  bcrypt: ^1.2.0
  equatable: ^2.1.0
  logger: ^2.7.0
  esc_pos_utils_plus: ^2.0.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  drift_dev: ^2.20.0
  json_serializable: ^6.8.0



flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

dependency_overrides:
  image: ^4.1.3
  intl: ^0.20.2

